stages:
  - lint
  - test
  - validate
  - build
  - deploy
  - notify

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ==================== LINT ====================
lint:
  stage: lint
  image: golangci/golangci-lint:v2.1.6
  script:
    - cd habits-tracker
    - golangci-lint run ./...
  allow_failure: true

# ==================== TEST ====================
test:
  stage: test
  image: golang:1.26.0-alpine
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: testuser
    POSTGRES_PASSWORD: testpass
    DATABASE_URL: "postgres://testuser:testpass@postgres:5432/testdb?sslmode=disable"
  before_script:
    - apk add --no-cache gcc musl-dev
    - cd habits-tracker
  script:
    - go test -v -cover -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    paths:
      - habits-tracker/coverage.out
    expire_in: 7 days

# ==================== VALIDATE ====================
validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.12
    entrypoint: [""]
  script:
    - cd terraform
    - terraform init -backend=false
    - terraform validate
    - terraform fmt -check
  allow_failure: true

# ==================== BUILD ====================
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# ==================== DEPLOY ====================
deploy:
  stage: deploy
  image: alpine:3.23
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $APP_SERVER_IP >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - ssh -o StrictHostKeyChecking=no ubuntu@$APP_SERVER_IP "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        cd /opt/habit-tracker &&
        docker compose pull app &&
        docker compose up -d &&
        sleep 10 &&
        docker compose ps"
  only:
    - main

# ==================== NOTIFY ====================
notify_success:
  stage: notify
  image: alpine:3.23
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d chat_id="${TELEGRAM_CHAT_ID}" \
        -d parse_mode="HTML" \
        -d text="<b>✅ Deploy successful</b>%0A%0AProject: ${CI_PROJECT_NAME}%0ABranch: ${CI_COMMIT_REF_NAME}%0ACommit: ${CI_COMMIT_SHORT_SHA}%0A%0A<a href='${CI_PIPELINE_URL}'>Pipeline</a>"
  when: on_success
  only:
    - main

notify_failure:
  stage: notify
  image: alpine:3.23
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
        -d chat_id="${TELEGRAM_CHAT_ID}" \
        -d parse_mode="HTML" \
        -d text="<b>❌ Pipeline failed</b>%0A%0AProject: ${CI_PROJECT_NAME}%0ABranch: ${CI_COMMIT_REF_NAME}%0ACommit: ${CI_COMMIT_SHORT_SHA}%0A%0A<a href='${CI_PIPELINE_URL}'>Pipeline</a>"
  when: on_failure
  only:
    - main
