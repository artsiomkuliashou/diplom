name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/habit-tracker

jobs:
  # ==================== LINT ====================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: habits-tracker
        continue-on-error: true


  # ==================== BUILD ====================
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          FULL_IMAGE: ghcr.io/${{ github.repository }}/habit-tracker
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build -t "$FULL_IMAGE:$SHA_TAG" -t "$FULL_IMAGE:latest" .
          docker push "$FULL_IMAGE:$SHA_TAG"
          docker push "$FULL_IMAGE:latest"

  # ==================== DEPLOY ====================
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to app server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.APP_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /opt/habit-tracker
            docker compose pull app
            docker compose up -d --wait

  # ==================== NOTIFY ====================
  notify:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Send Telegram notification
        env:
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "$DEPLOY_RESULT" == "success" ]; then
            TEXT="<b>✅ Deploy successful</b>%0A%0AProject: ${REPO}%0ABranch: ${BRANCH}%0ACommit: ${COMMIT:0:7}%0A%0A<a href='${RUN_URL}'>Workflow</a>"
          else
            TEXT="<b>❌ Pipeline failed</b>%0A%0AProject: ${REPO}%0ABranch: ${BRANCH}%0ACommit: ${COMMIT:0:7}%0A%0A<a href='${RUN_URL}'>Workflow</a>"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d parse_mode="HTML" \
            -d text="$TEXT"
