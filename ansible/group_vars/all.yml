---
# Project
project_name: habit-tracker
deploy_dir: /opt/{{ project_name }}

# Domain (replace with real domain)
domain: example.com

# Docker Registry (GitLab Container Registry)
registry_url: registry.gitlab.com
registry_user: "{{ vault_registry_user | default('gitlab-ci-token') }}"
registry_password: "{{ vault_registry_password | default('') }}"
app_image: "{{ registry_url }}/YOUR_GROUP/YOUR_PROJECT/habit-tracker:latest"

# Database
db_name: habitdb
db_user: habituser
db_password: "{{ lookup('env', 'DB_PASSWORD') | default('change_me', true) }}"

# Monitoring
prometheus_port: 9090
grafana_port: 3000
node_exporter_port: 9100
cadvisor_port: 8081

# Logging
elasticsearch_port: 9200
logstash_port: 5044
kibana_port: 5601

# App server IP (for Prometheus scraping)
app_server_ip: "{{ hostvars['app']['ansible_host'] }}"
monitoring_server_ip: "{{ hostvars['monitoring']['ansible_host'] }}"
